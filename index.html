<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TengaTicket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap { text-align: center; padding: 20px; }
    .logo {
      width: 64px; height: 64px;
      background: #4f46e5;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }
    h1 { font-size: 1.8rem; font-weight: 800; color: #818cf8; }
    p { margin-top: 12px; color: #64748b; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">🎟️</div>
    <h1>TengaTicket</h1>
    <p>We're coming soon. The tickets are ready, we just forgot to build the website. 😅</p>
  </div>
</body>
</html>
